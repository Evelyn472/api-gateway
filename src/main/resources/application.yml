server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ms-cursos
          uri: lb://MS-CURSOS
          predicates:
            - Path=/api/v1/cursos/**

        - id: ms-profesores
          uri: lb://MS-PROFESORES
          predicates:
            - Path=/api/v1/profesores/**

        - id: ms-asistencia
          uri: lb://MS-ASISTENCIA
          predicates:
            - Path=/api/v1/asistencias/**

        - id: ms-horarios
          uri: lb://MS-HORARIOS
          predicates:
            - Path=/api/v1/horario/**

        - id: ms-comunicaciones
          uri: lb://MS-COMUNICACIONES
          predicates:
            - Path=/api/comunicaciones/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"